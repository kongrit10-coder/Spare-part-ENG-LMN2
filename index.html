<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spare Parts System</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;
  --accent:#f59e0b;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--purple:#bc8cff;
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --radius:10px;--shadow:0 8px 32px rgba(0,0,0,.5);
  --font:'Sarabun',sans-serif;--mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;height:56px;background:rgba(13,17,23,.95);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:12px;}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo-box{width:32px;height:32px;border-radius:7px;background:linear-gradient(135deg,var(--accent),#d97706);display:flex;align-items:center;justify-content:center;font-size:17px;}
.logo-name{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--text);letter-spacing:.5px}
.logo-name span{color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:8px}
.btn{font-family:var(--font);font-size:13px;font-weight:600;padding:7px 16px;border-radius:7px;border:none;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text);border-color:var(--text2)}
.btn-primary{background:var(--accent);color:#000;font-weight:700}.btn-primary:hover{background:#fbbf24}
.btn-blue{background:rgba(88,166,255,.15);color:var(--blue);border:1px solid rgba(88,166,255,.3)}.btn-blue:hover{background:rgba(88,166,255,.25)}
.btn-green{background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.3)}.btn-green:hover{background:rgba(63,185,80,.25)}
.btn-red{background:rgba(248,81,73,.1);color:var(--red);border:1px solid rgba(248,81,73,.25)}.btn-red:hover{background:rgba(248,81,73,.2)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.wrap{max-width:1200px;margin:0 auto;padding:76px 20px 48px}
.page{display:none}.page.active{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.sec-title{font-size:clamp(20px,3vw,28px);font-weight:700;margin-bottom:4px}.sec-title span{color:var(--accent)}
.sec-sub{color:var(--text2);font-size:13px;margin-bottom:24px}
.search-row{display:flex;gap:10px;margin-bottom:20px}
.search-box{flex:1;position:relative}
.search-box input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 14px 9px 38px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:.18s}
.search-box input:focus{border-color:var(--accent)}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3)}
.machine-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.m-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.m-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--blue));opacity:0;transition:.2s}
.m-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 24px rgba(245,158,11,.1)}
.m-card:hover::after{opacity:1}
.m-card-icon{font-size:28px;margin-bottom:10px}
.m-card-id{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:1px;margin-bottom:4px}
.m-card-name{font-size:15px;font-weight:700;margin-bottom:3px}
.m-card-loc{font-size:12px;color:var(--text2);margin-bottom:10px}
.m-card-foot{display:flex;align-items:center;justify-content:space-between}
.part-badge{font-size:11px;font-weight:600;background:rgba(63,185,80,.12);color:var(--green);border:1px solid rgba(63,185,80,.25);padding:2px 9px;border-radius:20px}
.m-card-arrow{color:var(--text3);transition:.18s}.m-card:hover .m-card-arrow{color:var(--accent);transform:translateX(3px)}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--text2);background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:6px 13px;cursor:pointer;margin-bottom:18px;transition:.18s}
.back-btn:hover{color:var(--accent);border-color:var(--accent)}
.m-header{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.m-header-icon{width:54px;height:54px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),#d97706);display:flex;align-items:center;justify-content:center;font-size:26px}
.m-header-info h2{font-size:20px;font-weight:700;margin-bottom:2px}
.m-header-info p{font-size:13px;color:var(--text2)}
.chips{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap}
.chip{font-size:11px;font-weight:600;letter-spacing:.4px;padding:3px 10px;border-radius:20px}
.chip-blue{background:rgba(88,166,255,.12);color:var(--blue);border:1px solid rgba(88,166,255,.25)}
.chip-green{background:rgba(63,185,80,.12);color:var(--green);border:1px solid rgba(63,185,80,.25)}
.chip-red{background:rgba(248,81,73,.1);color:var(--red);border:1px solid rgba(248,81,73,.2)}
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.table-bar{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px}
.table-title{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.5px;font-family:var(--mono)}
.table-tools{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.table-tools input,.table-tools select{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-family:var(--font);font-size:12px;outline:none}
.table-tools input{width:150px}.table-tools input:focus{border-color:var(--accent)}
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--bg3);color:var(--text2);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:10px 14px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid rgba(48,54,61,.6);transition:background .12s}
tbody tr:hover{background:rgba(88,166,255,.03)}
tbody tr:last-child{border-bottom:none}
td{padding:10px 14px;vertical-align:middle}
.part-img{width:42px;height:42px;object-fit:cover;border-radius:7px;border:1px solid var(--border)}
.no-img{width:42px;height:42px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:18px}
.mono{font-family:var(--mono);font-size:11px;color:var(--blue)}
.fw{font-weight:600}
.tag{font-size:10px;font-weight:700;letter-spacing:.5px;padding:2px 8px;border-radius:12px}
.tag-mech{background:rgba(245,158,11,.1);color:var(--accent);border:1px solid rgba(245,158,11,.2)}
.tag-elec{background:rgba(88,166,255,.1);color:var(--blue);border:1px solid rgba(88,166,255,.2)}
.tag-pneu{background:rgba(63,185,80,.1);color:var(--green);border:1px solid rgba(63,185,80,.2)}
.tag-cons{background:rgba(248,81,73,.1);color:var(--red);border:1px solid rgba(248,81,73,.2)}
.tag-other{background:rgba(188,140,255,.1);color:var(--purple);border:1px solid rgba(188,140,255,.2)}
.qty-ok{color:var(--green);font-weight:700}.qty-low{color:var(--red);font-weight:700}.qty-warn{color:var(--accent);font-weight:700}
.td-actions{display:flex;gap:5px}
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow);animation:modalIn .22s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:1}
.modal-head h3{font-size:16px;font-weight:700}
.modal-close{width:30px;height:30px;border-radius:7px;border:none;background:var(--bg3);color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.15s}
.modal-close:hover{background:var(--red);color:#fff}
.modal-body{padding:22px}.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 13px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:.18s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.1)}
.form-group select option{background:var(--bg3)}
.form-group textarea{resize:vertical;min-height:72px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.img-preview{width:100%;height:100px;border-radius:8px;border:1px dashed var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;margin-top:8px;cursor:pointer;transition:.18s}
.img-preview:hover{border-color:var(--accent)}
.img-preview img{width:100%;height:100%;object-fit:cover}
.img-preview-empty{color:var(--text3);font-size:12px;text-align:center;padding:10px}
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--bg2);border-radius:10px;padding:12px 18px;font-size:13px;font-weight:600;box-shadow:var(--shadow);transform:translateX(120%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);border:1px solid var(--border);display:flex;align-items:center;gap:8px;max-width:320px}
.toast.show{transform:none}.toast.ok{border-color:var(--green);color:var(--green)}.toast.err{border-color:var(--red);color:var(--red)}.toast.warn{border-color:var(--accent);color:var(--accent)}
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:14px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader p{font-size:13px;color:var(--text2)}
.empty{text-align:center;padding:50px 20px}
.empty-ico{font-size:48px;opacity:.3;margin-bottom:12px}
.empty p{color:var(--text2);font-size:14px}
@media(max-width:600px){.machine-grid{grid-template-columns:1fr 1fr}.topbar{padding:0 12px}thead th:nth-child(n+8){display:none}td:nth-child(n+8){display:none}}
@media(max-width:380px){.machine-grid{grid-template-columns:1fr}.form-row,.form-row-3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo" onclick="goMain()">
    <div class="logo-box">⚙️</div>
    <div class="logo-name">SPARE<span>PARTS</span></div>
  </div>
  <div class="topbar-right">
    <button class="btn btn-ghost btn-sm" onclick="goMain()">🏭 Machines</button>
    <button class="btn btn-primary btn-sm" onclick="openAddMachineModal()">+ เครื่องจักร</button>
  </div>
</div>

<div class="wrap">
  <!-- MAIN PAGE -->
  <div class="page active" id="page-main">
    <div class="sec-title">รายการ<span>เครื่องจักร</span></div>
    <div class="sec-sub" id="machine-sub">กำลังโหลด...</div>
    <div class="search-row">
      <div class="search-box">
        <span class="search-ico">🔍</span>
        <input type="text" placeholder="ค้นหาเครื่องจักร..." id="search-m" oninput="filterMachines()">
      </div>
    </div>
    <div class="machine-grid" id="machine-grid">
      <div style="grid-column:1/-1"><div class="loader"><div class="spinner"></div><p>กำลังโหลด...</p></div></div>
    </div>
  </div>

  <!-- DETAIL PAGE -->
  <div class="page" id="page-detail">
    <button class="back-btn" onclick="goMain()">← กลับ</button>
    <div class="m-header">
      <div class="m-header-icon" id="mh-icon">⚙️</div>
      <div class="m-header-info">
        <h2 id="mh-name">—</h2>
        <p id="mh-sub">—</p>
        <div class="chips" id="mh-chips"></div>
      </div>
      <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" onclick="openEditMachineModal()">✏️ แก้ไข</button>
        <button class="btn btn-green btn-sm" onclick="openAddPartModal()">+ เพิ่มอะไหล่</button>
      </div>
    </div>
    <div class="table-card">
      <div class="table-bar">
        <span class="table-title">📦 SPARE PARTS LIST</span>
        <div class="table-tools">
          <input type="text" placeholder="🔍 ค้นหาอะไหล่..." id="search-p" oninput="filterParts()">
          <select id="filter-type" onchange="filterParts()">
            <option value="">ทุกประเภท</option>
            <option>Mechanical</option><option>Electrical</option>
            <option>Pneumatic</option><option>Consumable</option><option>Other</option>
          </select>
        </div>
      </div>
      <div class="tscroll">
        <table>
          <thead><tr>
            <th>#</th><th>รูป</th><th>Item No.</th><th>ชื่ออะไหล่</th>
            <th>จำนวน</th><th>หน่วย</th><th>ราคา</th><th>ประเภท</th>
            <th>Min</th><th>Max</th><th>Supplier</th><th>จัดการ</th>
          </tr></thead>
          <tbody id="parts-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: MACHINE -->
<div class="modal-overlay" id="modal-machine">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modal-machine-title">➕ เพิ่มเครื่องจักรใหม่</h3>
      <button class="modal-close" onclick="closeModal('modal-machine')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="fm-edit-id">
      <div class="form-row">
        <div class="form-group"><label>Machine ID *</label><input type="text" id="fm-id" placeholder="เช่น M001"></div>
        <div class="form-group"><label>ไอคอน (Emoji)</label><input type="text" id="fm-icon" placeholder="⚙️" maxlength="4"></div>
      </div>
      <div class="form-group"><label>ชื่อเครื่องจักร *</label><input type="text" id="fm-name" placeholder="เช่น Weighing Machine"></div>
      <div class="form-group"><label>Location / Line</label><input type="text" id="fm-loc" placeholder="เช่น Line 1"></div>
      <div class="form-group"><label>รายละเอียด</label><textarea id="fm-desc" placeholder="คำอธิบาย..."></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('modal-machine')">ยกเลิก</button>
      <button class="btn btn-primary" id="fm-submit" onclick="submitMachine()">💾 บันทึก</button>
    </div>
  </div>
</div>

<!-- MODAL: PART -->
<div class="modal-overlay" id="modal-part">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modal-part-title">➕ เพิ่มอะไหล่ใหม่</h3>
      <button class="modal-close" onclick="closeModal('modal-part')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="fp-edit-id">
      <div class="form-row">
        <div class="form-group"><label>Item Number / Part No.</label><input type="text" id="fp-number" placeholder="เช่น SKF-6205"></div>
        <div class="form-group"><label>ประเภทอะไหล่</label>
          <select id="fp-type"><option>Mechanical</option><option>Electrical</option><option>Pneumatic</option><option>Consumable</option><option>Other</option></select>
        </div>
      </div>
      <div class="form-group"><label>ชื่อรายการอะไหล่ *</label><input type="text" id="fp-name" placeholder="เช่น Bearing 6205 2RS"></div>
      <div class="form-row-3">
        <div class="form-group"><label>จำนวน (Stock)</label><input type="number" id="fp-qty" placeholder="0" min="0"></div>
        <div class="form-group"><label>หน่วย</label><input type="text" id="fp-unit" placeholder="ชิ้น"></div>
        <div class="form-group"><label>ราคา (บาท)</label><input type="number" id="fp-price" placeholder="0" min="0"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Min Stock</label><input type="number" id="fp-min" placeholder="0" min="0"></div>
        <div class="form-group"><label>Max Stock</label><input type="number" id="fp-max" placeholder="0" min="0"></div>
      </div>
      <div class="form-group"><label>Supplier / ผู้จำหน่าย</label><input type="text" id="fp-supplier" placeholder="ชื่อบริษัท / เบอร์โทร"></div>
      <div class="form-group">
        <label>URL รูปภาพ</label>
        <input type="text" id="fp-img" placeholder="https://..." oninput="previewImg()">
        <div class="img-preview" id="img-preview"><div class="img-preview-empty">🖼️<br>วาง URL รูปภาพ</div></div>
      </div>
      <div class="form-group"><label>หมายเหตุ</label><input type="text" id="fp-note" placeholder="หมายเหตุ..."></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('modal-part')">ยกเลิก</button>
      <button class="btn btn-primary" id="fp-submit" onclick="submitPart()">💾 บันทึก</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toast-ico"></span><span id="toast-msg"></span></div>

<script>
// ═══════════════════════════════════════════════
// ⚙️ ใส่ Apps Script URL ของคุณตรงนี้
// ═══════════════════════════════════════════════
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwrYxntI2K_YiJBWhVfztRrL3aI9XX_Js4hLGYGukJFQlmqwImVVZ3VZNdxezQcNwp_/exec';
// ═══════════════════════════════════════════════

var _machines = [], _parts = [], _cur = null;

// ── API — ดึงข้อมูลจาก Google Sheets จริง ──
function api(action, payload) {
  // ถ้ายังไม่ได้ตั้งค่า URL → แจ้งเตือน
  if (!SCRIPT_URL || SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    return Promise.reject(new Error('กรุณาตั้งค่า SCRIPT_URL ใน index.html ก่อนใช้งาน'));
  }
  var p = new URLSearchParams({ action: action, payload: JSON.stringify(payload || {}) });
  return fetch(SCRIPT_URL + '?' + p.toString())
    .then(function(r) { return r.text(); })
    .then(function(t) {
      try { return JSON.parse(t); }
      catch(e) { throw new Error('Response ผิดพลาด: ' + t.substring(0, 100)); }
    });
}

// ── PAGES ──
function goMain() { show('page-main'); _cur = null; loadMachines(); }
function show(id) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ── MACHINES ──
function loadMachines() {
  var grid = document.getElementById('machine-grid');
  grid.innerHTML = '<div style="grid-column:1/-1"><div class="loader"><div class="spinner"></div><p>กำลังโหลด...</p></div></div>';
  api('getMachines').then(function(d) {
    _machines = d.machines || [];
    document.getElementById('machine-sub').textContent = 'เครื่องจักรทั้งหมด ' + _machines.length + ' เครื่อง';
    renderMachines(_machines);
  }).catch(function(e) {
    grid.innerHTML = '<div style="grid-column:1/-1"><div class="empty"><div class="empty-ico">⚠️</div><p>' + e.message + '</p></div></div>';
    document.getElementById('machine-sub').textContent = 'โหลดไม่สำเร็จ';
  });
}

function renderMachines(list) {
  var grid = document.getElementById('machine-grid');
  document.getElementById('machine-sub').textContent = 'เครื่องจักรทั้งหมด ' + list.length + ' เครื่อง';
  if (!list.length) {
    grid.innerHTML = '<div style="grid-column:1/-1"><div class="empty"><div class="empty-ico">🏭</div><p>ยังไม่มีเครื่องจักร</p></div></div>';
    return;
  }
  grid.innerHTML = list.map(function(m, i) {
    return '<div class="m-card" style="animation-delay:' + (i*0.04) + 's" onclick="openMachine(\'' + esc(m.machine_id) + '\')">' +
      '<div class="m-card-icon">' + (m.icon||'⚙️') + '</div>' +
      '<div class="m-card-id">' + esc(m.machine_id) + '</div>' +
      '<div class="m-card-name">' + esc(m.machine_name) + '</div>' +
      '<div class="m-card-loc">📍 ' + esc(m.location||'—') + '</div>' +
      '<div class="m-card-foot"><span class="part-badge">🔩 ' + (m.part_count||0) + ' รายการ</span><span class="m-card-arrow">›</span></div>' +
    '</div>';
  }).join('');
}

function filterMachines() {
  var q = document.getElementById('search-m').value.toLowerCase();
  renderMachines(_machines.filter(function(m){
    return (m.machine_name + m.machine_id + (m.location||'')).toLowerCase().includes(q);
  }));
}

// ── OPEN MACHINE ──
function openMachine(id) {
  _cur = _machines.find(function(m){ return m.machine_id === id; });
  if (!_cur) return;
  document.getElementById('mh-icon').textContent = _cur.icon||'⚙️';
  document.getElementById('mh-name').textContent = _cur.machine_name;
  document.getElementById('mh-sub').textContent  = '📍 ' + (_cur.location||'—') + (_cur.description ? ' | ' + _cur.description : '');
  show('page-detail');
  loadParts(id);
}

function loadParts(mid) {
  var tbody = document.getElementById('parts-tbody');
  tbody.innerHTML = '<tr><td colspan="12"><div class="loader"><div class="spinner"></div><p>กำลังโหลด...</p></div></td></tr>';
  api('getParts', { machine_id: mid }).then(function(d) {
    _parts = d.parts || [];
    updateChips();
    renderParts(_parts);
  }).catch(function(e) {
    tbody.innerHTML = '<tr><td colspan="12"><div class="empty"><div class="empty-ico">⚠️</div><p>' + e.message + '</p></div></td></tr>';
  });
}

function updateChips() {
  var total = _parts.length;
  var low   = _parts.filter(function(p){ return p.stock_qty < p.min_stock; }).length;
  document.getElementById('mh-chips').innerHTML =
    '<span class="chip chip-blue">รายการ: ' + total + '</span>' +
    '<span class="chip chip-green">OK: ' + (total-low) + '</span>' +
    (low ? '<span class="chip chip-red">⚠️ ต่ำกว่า Min: ' + low + '</span>' : '');
}

var TTAG = {Mechanical:'tag-mech',Electrical:'tag-elec',Pneumatic:'tag-pneu',Consumable:'tag-cons',Other:'tag-other'};

function renderParts(parts) {
  var tbody = document.getElementById('parts-tbody');
  if (!parts.length) {
    tbody.innerHTML = '<tr><td colspan="12"><div class="empty"><div class="empty-ico">📦</div><p>ยังไม่มีรายการอะไหล่</p></div></td></tr>';
    return;
  }
  tbody.innerHTML = parts.map(function(p, i) {
    var qty = p.stock_qty, mn = p.min_stock, mx = p.max_stock;
    var qc  = qty < mn ? 'qty-low' : (mx > 0 && qty > mx ? 'qty-warn' : 'qty-ok');
    var tc  = TTAG[p.type] || 'tag-other';
    var img = p.image_url
      ? '<img class="part-img" src="' + esc(p.image_url) + '" onerror="this.outerHTML=\'<div class=no-img>📷</div>\'">'
      : '<div class="no-img">📷</div>';
    var price = p.price ? Number(p.price).toLocaleString('th-TH',{minimumFractionDigits:2}) : '—';
    return '<tr>' +
      '<td style="color:var(--text3);font-size:11px">' + (i+1) + '</td>' +
      '<td>' + img + '</td>' +
      '<td><span class="mono">' + esc(p.item_number||p.part_number||'—') + '</span></td>' +
      '<td><span class="fw">' + esc(p.part_name) + '</span></td>' +
      '<td><span class="' + qc + '">' + qty + '</span></td>' +
      '<td style="color:var(--text2)">' + esc(p.unit||'ชิ้น') + '</td>' +
      '<td style="font-family:var(--mono);font-size:12px">' + price + '</td>' +
      '<td><span class="tag ' + tc + '">' + (p.type||'—') + '</span></td>' +
      '<td style="color:var(--green);font-size:12px">' + mn + '</td>' +
      '<td style="color:var(--red);font-size:12px">' + mx + '</td>' +
      '<td style="color:var(--text2);font-size:11px;max-width:140px;word-break:break-word">' + esc(p.supplier||'') + '</td>' +
      '<td><div class="td-actions">' +
        '<button class="btn btn-blue btn-sm" onclick="openEditPartModal(\'' + esc(p.part_id) + '\')">✏️</button>' +
        '<button class="btn btn-red btn-sm" onclick="confirmDelete(\'' + esc(p.part_id) + '\',\'' + esc(p.part_name) + '\')">🗑️</button>' +
      '</div></td>' +
    '</tr>';
  }).join('');
}

function filterParts() {
  var q = document.getElementById('search-p').value.toLowerCase();
  var t = document.getElementById('filter-type').value;
  renderParts(_parts.filter(function(p){
    return (p.part_name+(p.item_number||p.part_number||'')).toLowerCase().includes(q) && (!t||p.type===t);
  }));
}

// ── MODALS ──
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function openAddMachineModal() {
  document.getElementById('modal-machine-title').textContent = '➕ เพิ่มเครื่องจักรใหม่';
  document.getElementById('fm-edit-id').value = '';
  ['fm-id','fm-name','fm-loc','fm-desc'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('fm-icon').value = '⚙️';
  document.getElementById('fm-id').disabled = false;
  openModal('modal-machine');
}
function openEditMachineModal() {
  if (!_cur) return;
  document.getElementById('modal-machine-title').textContent = '✏️ แก้ไขเครื่องจักร';
  document.getElementById('fm-edit-id').value = _cur.machine_id;
  document.getElementById('fm-id').value      = _cur.machine_id;
  document.getElementById('fm-name').value    = _cur.machine_name;
  document.getElementById('fm-loc').value     = _cur.location||'';
  document.getElementById('fm-desc').value    = _cur.description||'';
  document.getElementById('fm-icon').value    = _cur.icon||'⚙️';
  document.getElementById('fm-id').disabled   = true;
  openModal('modal-machine');
}
function submitMachine() {
  var editId = document.getElementById('fm-edit-id').value;
  var mid    = document.getElementById('fm-id').value.trim();
  var mname  = document.getElementById('fm-name').value.trim();
  if (!mname) { toast('กรุณากรอกชื่อเครื่องจักร','err'); return; }
  if (!editId && !mid) { toast('กรุณากรอก Machine ID','err'); return; }
  var btn = document.getElementById('fm-submit');
  btn.disabled = true; btn.textContent = '⏳ กำลังบันทึก...';
  var payload = { machine_id: editId||mid, machine_name: mname,
    location: document.getElementById('fm-loc').value.trim(),
    description: document.getElementById('fm-desc').value.trim(),
    icon: document.getElementById('fm-icon').value.trim()||'⚙️' };
  api(editId ? 'editMachine' : 'addMachine', payload)
    .then(function(d){
      if (d.error) { toast('❌ ' + d.error,'err'); return; }
      toast('✅ ' + (d.message||'บันทึกสำเร็จ'),'ok');
      closeModal('modal-machine'); loadMachines();
    })
    .catch(function(e){ toast('❌ ' + e.message,'err'); })
    .finally(function(){ btn.disabled=false; btn.textContent='💾 บันทึก'; });
}

function openAddPartModal() {
  document.getElementById('modal-part-title').textContent = '➕ เพิ่มอะไหล่ใหม่';
  document.getElementById('fp-edit-id').value = '';
  ['fp-number','fp-name','fp-qty','fp-unit','fp-price','fp-min','fp-max','fp-img','fp-note','fp-supplier'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('fp-type').value = 'Mechanical';
  document.getElementById('fp-unit').value = 'ชิ้น';
  resetImgPreview(); openModal('modal-part');
}
function openEditPartModal(partId) {
  var p = _parts.find(function(x){ return x.part_id === partId; });
  if (!p) return;
  document.getElementById('modal-part-title').textContent = '✏️ แก้ไขอะไหล่';
  document.getElementById('fp-edit-id').value  = p.part_id;
  document.getElementById('fp-number').value   = p.item_number||p.part_number||'';
  document.getElementById('fp-name').value     = p.part_name;
  document.getElementById('fp-type').value     = p.type||'Mechanical';
  document.getElementById('fp-qty').value      = p.stock_qty;
  document.getElementById('fp-unit').value     = p.unit||'ชิ้น';
  document.getElementById('fp-price').value    = p.price||'';
  document.getElementById('fp-min').value      = p.min_stock||'';
  document.getElementById('fp-max').value      = p.max_stock||'';
  document.getElementById('fp-supplier').value = p.supplier||'';
  document.getElementById('fp-img').value      = p.image_url||'';
  document.getElementById('fp-note').value     = p.note||'';
  previewImg(); openModal('modal-part');
}
function submitPart() {
  var editId = document.getElementById('fp-edit-id').value;
  var name   = document.getElementById('fp-name').value.trim();
  if (!name) { toast('กรุณากรอกชื่ออะไหล่','err'); return; }
  if (!_cur)  { toast('ไม่ได้เลือกเครื่องจักร','err'); return; }
  var btn = document.getElementById('fp-submit');
  btn.disabled = true; btn.textContent = '⏳ กำลังบันทึก...';
  var payload = {
    machine_id: _cur.machine_id, part_name: name,
    part_number: document.getElementById('fp-number').value.trim(),
    stock_qty:  parseFloat(document.getElementById('fp-qty').value)||0,
    unit:       document.getElementById('fp-unit').value.trim()||'ชิ้น',
    price:      parseFloat(document.getElementById('fp-price').value)||0,
    type:       document.getElementById('fp-type').value,
    min_stock:  parseFloat(document.getElementById('fp-min').value)||0,
    max_stock:  parseFloat(document.getElementById('fp-max').value)||0,
    supplier:   document.getElementById('fp-supplier').value.trim(),
    image_url:  document.getElementById('fp-img').value.trim(),
    note:       document.getElementById('fp-note').value.trim()
  };
  if (editId) payload.part_id = editId;
  api(editId ? 'editPart' : 'addPart', payload)
    .then(function(d){
      if (d.error) { toast('❌ ' + d.error,'err'); return; }
      toast('✅ ' + (d.message||'บันทึกสำเร็จ'),'ok');
      closeModal('modal-part'); loadParts(_cur.machine_id);
    })
    .catch(function(e){ toast('❌ ' + e.message,'err'); })
    .finally(function(){ btn.disabled=false; btn.textContent='💾 บันทึก'; });
}
function confirmDelete(partId, partName) {
  if (!confirm('ลบ "' + partName + '" ใช่ไหม?')) return;
  api('deletePart', { part_id: partId }).then(function(d){
    if (d.error) { toast('❌ ' + d.error,'err'); return; }
    toast('🗑️ ลบสำเร็จ','warn'); loadParts(_cur.machine_id);
  });
}

function previewImg() {
  var url = document.getElementById('fp-img').value.trim();
  var box = document.getElementById('img-preview');
  if (!url) { resetImgPreview(); return; }
  box.innerHTML = '<img src="' + url + '" style="width:100%;height:100%;object-fit:cover" onerror="resetImgPreview()">';
}
function resetImgPreview() {
  document.getElementById('img-preview').innerHTML = '<div class="img-preview-empty">🖼️<br>วาง URL รูปภาพ</div>';
}
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.className = 'toast ' + (type||'ok');
  document.getElementById('toast-ico').textContent = {ok:'✅',err:'❌',warn:'⚠️'}[type||'ok']||'';
  document.getElementById('toast-msg').textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.classList.remove('show'); }, 3500);
}
function esc(s) {
  return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
}
document.querySelectorAll('.modal-overlay').forEach(function(o){
  o.addEventListener('click', function(e){ if(e.target===o) o.classList.remove('open'); });
});

loadMachines();
</script>
</body>
</html>
